backend:
  name: git-gateway
  repo: acryllect/lostunfound_rework
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/273fafd2-430a-4d47-b945-74848e055385/pkce
  auth_token_endpoint: /sites/273fafd2-430a-4d47-b945-74848e055385/token
  gateway_url: https://gateway.decapbridge.com

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "projects"
    label: "Portfolio Projects"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Artist", name: "artist", widget: "string" }
      - label: "Categories"
        name: "categories"
        widget: "select"
        multiple: true
        options:
          - "Songwriting"
          - "Production"
          - "Mixing"
          - "Mastering"
      - { label: "Genre / Tags", name: "genre", widget: "list", required: false }
      - { label: "Cover Image", name: "cover_image", widget: "image", required: false }
      - { label: "Spotify URL", name: "spotify_url", widget: "string", required: false }
      - { label: "SoundCloud URL", name: "soundcloud_url", widget: "string", required: false }
      - { label: "Description", name: "description", widget: "text", required: false }
      - label: "Credits"
        name: "credits"
        widget: "list"
        required: false
        fields:
          - { label: "Role", name: "role", widget: "string" }
          - { label: "Name", name: "name", widget: "string" }
      - { label: "Publish Date", name: "publish_date", widget: "datetime" }
      - { label: "Published", name: "published", widget: "boolean", default: true }

  - name: "pages"
    label: "Page Content"
    files:
      - name: "home"
        label: "Home"
        file: "src/content/pages/home.json"
        fields:
          - { label: "Intro text", name: "intro", widget: "text" }
          - { label: "SEO description", name: "seo_description", widget: "text", hint: "Shown in Google results and social sharing previews for the homepage." }

      - name: "about"
        label: "About"
        file: "src/content/pages/about.json"
        fields:
          - { label: "SEO description", name: "seo_description", widget: "text", hint: "Shown in Google results and social sharing previews for the About page." }
          - label: "Intro paragraphs"
            name: "intro"
            widget: "list"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }
          - { label: "Alessandro — Name", name: "alessandro_name", widget: "string" }
          - { label: "Alessandro — Role", name: "alessandro_role", widget: "string" }
          - { label: "Alessandro — Photo", name: "alessandro_image", widget: "image", required: false, hint: "Portrait photo. Recommended aspect ratio 3:4." }
          - label: "Alessandro — Bio paragraphs"
            name: "alessandro_bio"
            widget: "list"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }
          - { label: "Davide — Name", name: "davide_name", widget: "string" }
          - { label: "Davide — Role", name: "davide_role", widget: "string" }
          - { label: "Davide — Photo", name: "davide_image", widget: "image", required: false, hint: "Portrait photo. Recommended aspect ratio 3:4." }
          - label: "Davide — Bio paragraphs"
            name: "davide_bio"
            widget: "list"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }

      - name: "services"
        label: "Services"
        file: "src/content/pages/services.json"
        fields:
          - { label: "SEO description", name: "seo_description", widget: "text", hint: "Shown in Google results and social sharing previews for the Services page." }
          - { label: "Intro text", name: "intro", widget: "text" }
          - { label: "Pre-Production description", name: "pre_production", widget: "text" }
          - { label: "Recording & Production description", name: "recording", widget: "text" }
          - { label: "Mixing description", name: "mixing", widget: "text" }
          - { label: "Session Musicians description", name: "session_musicians", widget: "text" }

      - name: "contact"
        label: "Contact"
        file: "src/content/pages/contact.json"
        fields:
          - { label: "SEO description", name: "seo_description", widget: "text", hint: "Shown in Google results and social sharing previews for the Contact page." }
          - { label: "Lead text", name: "lead", widget: "text" }
          - { label: "No-form note", name: "no_form_note", widget: "string" }
          - { label: "Email address", name: "email", widget: "string" }
          - { label: "Location", name: "location", widget: "string" }
          - { label: "Response time", name: "response_time", widget: "string" }
          - { label: "Availability", name: "availability", widget: "string" }

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "site"
        label: "Global Settings"
        file: "src/content/pages/site.json"
        fields:
          - { label: "Site name", name: "site_name", widget: "string", hint: "Used as the og:site_name and default page title." }
          - { label: "Default SEO description", name: "site_description", widget: "text", hint: "Fallback meta description used on pages that don't have their own." }
          - label: "Default OG image"
            name: "og_image"
            widget: "image"
            required: false
            hint: "Shown when a page is shared on social media and has no specific image. Recommended size: 1200×630 px."
          - label: "Favicon"
            name: "favicon"
            widget: "image"
            required: false
            hint: "Upload an SVG or PNG to use as the site icon. After uploading, copy the path shown and save."
          - { label: "Instagram URL", name: "instagram_url", widget: "string", hint: "Full URL including https://. Shown as the floating button on all pages." }
